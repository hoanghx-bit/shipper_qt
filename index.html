<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shipper Quảng Trị Pro - Google Maps</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/6947/6947616.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --primary: #00b894; --secondary: #1a73e8; --danger: #d63031; --bg: #f5f6fa; --dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--dark); overflow: hidden; height: 100vh; }

        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            display: flex; align-items: center; gap: 10px; height: 55px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-btn { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
        header img { width: 30px; height: 30px; border-radius: 5px; }
        header h3 { margin: 0; font-size: 14px; text-transform: uppercase; }

        /* Sidebar Menu */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: white; z-index: 3000; transition: 0.3s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); padding-top: 60px;
        }
        .sidebar.open { left: 0; }
        .menu-item { padding: 18px 25px; display: flex; align-items: center; gap: 15px; font-size: 15px; border-bottom: 1px solid #f9f9f9; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2500; display: none; }

        .container { height: 100vh; width: 100%; position: relative; padding-top: 55px; }
        .page { display: none; height: 100%; overflow: hidden; background: var(--bg); }
        .page.active { display: block; }

        /* Search Bar Google Style */
        .search-area { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1001; display: flex; gap: 8px; }
        .search-area input { flex: 1; padding: 14px; border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-size: 14px; outline: none; }
        
        #map { height: 100%; width: 100%; }

        /* Bottom Panel - Đẩy cao tránh thanh điều hướng */
        .bottom-panel { 
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1002;
            background: white; border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 20px 15px 65px 15px; 
            box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
            transform: translateY(110%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        .bottom-panel.show { transform: translateY(0); }

        .info-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .info-item { text-align: center; flex: 1; }
        .info-item span { font-size: 10px; color: #888; display: block; margin-bottom: 4px; }
        .info-item b { font-size: 18px; }

        .cod-input-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; background: #f1f3f5; padding: 12px; border-radius: 15px; margin-bottom: 20px; }
        .cod-input-wrap input { width: 120px; border: 1px solid #ced4da; padding: 8px; border-radius: 10px; text-align: right; font-size: 20px; font-weight: bold; color: var(--danger); }

        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 15px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-save { background: var(--primary); color: white; }
        .btn-nav { background: #ff9f43; color: white; }

        /* History & Settings */
        .scroll-page { overflow-y: auto; height: calc(100vh - 55px); padding-bottom: 50px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; background: white; }
        .history-item { background: white; padding: 15px; margin: 10px 12px; border-radius: 15px; border-left: 5px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<header>
    <div class="menu-btn" onclick="toggleMenu()">
        <img src="https://cdn-icons-png.flaticon.com/512/6947/6947616.png">
        <h3>QUẢNG TRỊ SHIPPER</h3>
    </div>
</header>

<div class="sidebar" id="sidebar">
    <div class="menu-item" onclick="showPage('home')">🏠 Bản đồ & Tạo đơn</div>
    <div class="menu-item" onclick="showPage('history')">📜 Lịch sử giao hàng</div>
    <div class="menu-item" onclick="showPage('settings')">⚙️ Cài đặt bảng giá</div>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container">
    <div id="page-home" class="page active">
        <div class="search-area">
            <input type="text" id="destInput" placeholder="Nhập địa chỉ hoặc điểm đến...">
        </div>
        <div id="map"></div>
        <div id="bottomPanel" class="bottom-panel">
            <div class="info-bar">
                <div class="info-item"><span>Quãng đường</span><b id="out-dist">0.0</b> km</div>
                <div class="info-item"><span>Tiền Ship</span><b id="out-fare">0đ</b></div>
                <div class="info-item"><span>Tổng thu</span><b id="out-total" style="color:var(--danger)">0đ</b></div>
            </div>
            <div class="cod-input-wrap">
                <span style="font-size: 14px; font-weight: bold;">Thu hộ (COD):</span>
                <input type="number" id="codAmount" oninput="updateTotal()" placeholder="0">
                <span style="font-weight: bold;">đ</span>
            </div>
            <div class="btn-group">
                <a id="googleNavBtn" href="#" target="_blank" class="btn btn-nav">DẪN ĐƯỜNG</a>
                <button class="btn btn-save" onclick="handleSave()">GIAO XONG</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page scroll-page">
        <div class="stats-grid" id="stats-area">
            </div>
        <div id="history-list"></div>
        <div style="text-align:center; padding: 20px;"><button style="color:red; background:none; border:none;" onclick="clearHistory()">XÓA TẤT CẢ LỊCH SỬ</button></div>
    </div>

    <div id="page-settings" class="page scroll-page">
        <div style="padding: 20px;">
            <h4>CÀI ĐẶT BẢNG GIÁ</h4>
            <div id="rules-container"></div>
            <button onclick="addNewRule()" style="width:100%; padding:12px; border:2px dashed #ccc; background:none; border-radius:12px; margin-bottom:20px;">+ THÊM MỐC KM</button>
            <div style="background:white; padding:15px; border-radius:15px; margin-bottom: 20px;">
                <label>Giá mỗi KM tiếp theo:</label>
                <input type="number" id="price_next_km" style="width:100%; padding:12px; margin-top:10px; border:1px solid #ddd; border-radius:10px;">
            </div>
            <button class="btn btn-save" style="width:100%;" onclick="saveAllSettings()">LƯU CÀI ĐẶT</button>
        </div>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places"></script>

<script>
    let map, marker, directionsService, directionsRenderer, startPos, currentFare = 0;
    let priceRules = JSON.parse(localStorage.getItem('sqt_rules')) || [{km: 2, price: 15000}, {km: 3, price: 20000}];
    let nextKmPrice = parseInt(localStorage.getItem('sqt_next_price')) || 10000;

    function initMap() {
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ suppressMarkers: false });
        
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 14,
            center: { lat: 16.8173, lng: 107.0988 },
            disableDefaultUI: true,
        });
        directionsRenderer.setMap(map);

        // Lấy vị trí hiện tại
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                startPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setCenter(startPos);
                new google.maps.Marker({ position: startPos, map: map, icon: 'https://maps.google.com/mapfiles/ms/icons/blue-dot.png' });
            });
        }

        // Tìm kiếm địa chỉ (Autocomplete)
        const input = document.getElementById("destInput");
        const autocomplete = new google.maps.places.Autocomplete(input);
        autocomplete.addListener("place_changed", () => {
            const place = autocomplete.getPlace();
            if (place.geometry) calculateRoute(place.geometry.location);
        });

        // Click bản đồ để chọn điểm
        map.addListener("click", e => calculateRoute(e.latLng));
    }

    function calculateRoute(destLatLng) {
        if (!startPos) return alert("Đang lấy vị trí của bạn...");
        
        directionsService.route({
            origin: startPos,
            destination: destLatLng,
            travelMode: google.maps.TravelMode.DRIVING
        }, (result, status) => {
            if (status === "OK") {
                directionsRenderer.setDirections(result);
                let dist = result.routes[0].legs[0].distance.value / 1000;
                document.getElementById('out-dist').innerText = dist.toFixed(2);
                
                // Tính giá
                let fare = 0, matched = false;
                let sorted = [...priceRules].sort((a,b) => a.km - b.km);
                for(let r of sorted) { if(dist <= r.km) { fare = r.price; matched = true; break; } }
                if(!matched) fare = sorted[sorted.length-1].price + (Math.ceil(dist - sorted[sorted.length-1].km) * nextKmPrice);
                
                currentFare = fare;
                document.getElementById('out-fare').innerText = currentFare.toLocaleString() + "đ";
                updateTotal();
                document.getElementById('bottomPanel').classList.add('show');
                document.getElementById('googleNavBtn').href = `https://www.google.com/maps/dir/?api=1&destination=${destLatLng.lat()},${destLatLng.lng()}&travelmode=motorcycle`;
            }
        });
    }

    function toggleMenu() {
        const s = document.getElementById('sidebar');
        const o = document.getElementById('overlay');
        s.classList.toggle('open');
        o.style.display = s.classList.contains('open') ? 'block' : 'none';
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        toggleMenu();
        if(p === 'history') updateHistory();
        if(p === 'settings') renderRules();
    }

    function updateTotal() {
        let cod = parseInt(document.getElementById('codAmount').value) || 0;
        document.getElementById('out-total').innerText = (currentFare + cod).toLocaleString() + "đ";
    }

    function handleSave() {
        let h = JSON.parse(localStorage.getItem('sqt_v10')) || [];
        h.unshift({ id: Date.now(), ship: currentFare, cod: (parseInt(document.getElementById('codAmount').value) || 0), addr: document.getElementById('destInput').value || "Điểm trên bản đồ", date: new Date().toISOString() });
        localStorage.setItem('sqt_v10', JSON.stringify(h));
        alert("Đã lưu đơn!");
        resetForm();
    }

    function resetForm() {
        document.getElementById('bottomPanel').classList.remove('show');
        document.getElementById('destInput').value = "";
        document.getElementById('codAmount').value = "";
    }

    // Các hàm phụ trợ giữ nguyên logic bản trước...
    function renderRules() {
        const container = document.getElementById('rules-container');
        container.innerHTML = priceRules.map((rule, i) => `
            <div style="display:flex; align-items:center; gap:10px; background:white; padding:10px; border-radius:12px; margin-bottom:10px;">
                Dưới <input type="number" value="${rule.km}" onchange="priceRules[${i}].km=parseFloat(this.value)" style="width:50px"> km = 
                <input type="number" value="${rule.price}" onchange="priceRules[${i}].price=parseInt(this.value)" style="width:80px"> đ
                <span onclick="priceRules.splice(${i},1);renderRules()" style="color:red; margin-left:auto;">×</span>
            </div>`).join('');
        document.getElementById('price_next_km').value = nextKmPrice;
    }
    function addNewRule() { priceRules.push({km: 5, price: 30000}); renderRules(); }
    function saveAllSettings() {
        nextKmPrice = parseInt(document.getElementById('price_next_km').value);
        localStorage.setItem('sqt_rules', JSON.stringify(priceRules));
        localStorage.setItem('sqt_next_price', nextKmPrice);
        alert("Đã lưu!");
    }

    window.onload = initMap;
</script>
</body>
</html>
