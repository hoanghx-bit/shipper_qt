<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shipper Quảng Trị Pro v9.3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --primary: #00b894; --secondary: #0984e3; --danger: #d63031; --bg: #f5f6fa; --dark: #2d3436; --purple: #6c5ce7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); overflow: hidden; height: 100vh; }

        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            display: flex; align-items: center; height: 55px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Ô tìm kiếm từ bản v8.2 */
        .search-area { 
            position: absolute; top: 65px; left: 10px; right: 10px; z-index: 1001; 
            display: flex; flex-direction: column; gap: 5px; 
        }
        .input-group { display: flex; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
        .input-group input { flex: 1; padding: 12px; border: none; font-size: 13px; outline: none; background: white; }
        .btn-find { background: var(--secondary); color: white; border: none; padding: 0 12px; font-weight: bold; }

        .container { height: 100vh; width: 100%; position: relative; padding-top: 55px; }
        #map { height: 100%; width: 100%; z-index: 1; background: #e0e0e0; }

        /* Trạng thái đơn */
        .status-badge {
            position: absolute; top: 165px; left: 50%; transform: translateX(-50%);
            z-index: 1001; padding: 6px 15px; border-radius: 20px;
            font-weight: bold; font-size: 11px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap; transition: 0.3s;
        }
        .status-waiting { background: #ffeaa7; color: #d63031; border: 1px solid #fdcb6e; }
        .status-shipping { background: #55efc4; color: #00b894; border: 1px solid #00b894; }

        /* Panel dưới cùng đẩy cao chuẩn v8.2 */
        .bottom-panel { 
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1002;
            background: white; border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 15px 15px 65px 15px; box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
        }

        .info-bar { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        .info-item { text-align: center; flex: 1; border-right: 1px solid #f5f5f5; }
        .info-item:last-child { border: none; }
        .info-item span { font-size: 10px; color: #888; display: block; text-transform: uppercase; }
        .info-item b { font-size: 16px; color: var(--dark); }

        .cod-input-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; background: #f1f3f5; padding: 8px; border-radius: 12px; margin-bottom: 15px; }
        .cod-input-wrap input { width: 100px; border: 1px solid #ced4da; padding: 6px; border-radius: 8px; text-align: right; font-size: 18px; font-weight: bold; color: var(--danger); }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .row-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; text-align: center; color: white; text-decoration: none; }
        
        .btn-start { background: var(--secondary); }
        .btn-done { background: var(--primary); display: none; }
        .btn-cancel { background: #b2bec3; display: none; flex: 0.3; }
        .btn-save-quote { background: var(--purple); }
        .btn-nav { background: #ff9f43; }

        /* Lịch sử & Cài đặt */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .menu-item { padding: 18px 25px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 15px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2500; display: none; }
        .page { display: none; height: 100%; overflow-y: auto; background: var(--bg); position: absolute; top: 55px; width: 100%; z-index: 2001; padding-bottom: 100px; }
        .page.active { display: block; }
        
        .history-item { background: white; padding: 15px; margin: 10px; border-radius: 15px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<header>
    <div style="cursor:pointer; font-size: 22px; margin-right: 15px;" onclick="toggleMenu()">☰</div>
    <h3 style="font-size: 13px; margin: 0; letter-spacing: 1px;">QUẢNG TRỊ SHIPPER v9.3</h3>
</header>

<div class="sidebar" id="sidebar">
    <div class="menu-item" onclick="showPage('home')">🏠 Bản đồ & Ghi đơn</div>
    <div class="menu-item" onclick="showPage('history')">📜 Lịch sử giao hàng</div>
    <div class="menu-item" onclick="showPage('settings')">⚙️ Cài đặt bảng giá</div>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container">
    <div id="page-home" style="height: 100%; position: relative;">
        <div class="search-area">
            <div class="input-group">
                <input type="text" id="startAddr" placeholder="📍 Điểm lấy hàng (Hoặc gõ địa chỉ báo giá)">
                <button class="btn-find" onclick="findAddress('start')">TÌM</button>
            </div>
            <div class="input-group">
                <input type="text" id="destAddr" placeholder="🏁 Điểm giao khách (Hoặc gõ để báo giá)">
                <button class="btn-find" onclick="findAddress('dest')">TÌM</button>
            </div>
        </div>

        <div id="statusBadge" class="status-badge status-waiting">CHƯA CÓ ĐƠN</div>
        <div id="map"></div>

        <div class="bottom-panel">
            <div class="info-bar">
                <div class="info-item"><span>Quãng đường</span><b id="out-dist">0.0</b> km</div>
                <div class="info-item"><span>Tiền Ship</span><b id="out-fare">0đ</b></div>
                <div class="info-item"><span>Tổng thu</span><b id="out-total" style="color:var(--danger)">0đ</b></div>
            </div>
            
            <div class="cod-input-wrap">
                <span style="font-size:13px; font-weight:bold;">COD:</span>
                <input type="number" id="codAmount" placeholder="0" oninput="updateTotal()">
                <b>đ</b>
            </div>

            <div class="btn-group">
                <div class="row-btns">
                    <button id="btnStart" class="btn btn-start" onclick="startOrder()">📍 NHẬN ĐƠN TẠI ĐÂY</button>
                    <button id="btnCancel" class="btn btn-cancel" onclick="cancelOrder()">HỦY</button>
                    <button id="btnDone" class="btn btn-done" onclick="completeOrder()">✅ GIAO XONG (THỰC TẾ)</button>
                </div>
                <div class="row-btns">
                    <a id="navBtn" href="#" target="_blank" class="btn btn-nav" style="display:none">DẪN ĐƯỜNG</a>
                    <button id="btnSaveQuote" class="btn btn-save-quote" onclick="saveQuote()" style="display:none">LƯU ĐƠN BÁO GIÁ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div id="history-list" style="padding: 5px;"></div>
        <center><button onclick="clearHistory()" style="color:red; background:none; border:none; padding:20px;">XÓA TOÀN BỘ LỊCH SỬ</button></center>
    </div>

    <div id="page-settings" class="page">
        <div style="padding: 20px;">
            <h4 style="border-bottom: 2px solid var(--primary); padding-bottom: 10px;">CÀI ĐẶT BẢNG GIÁ</h4>
            <div id="rules-container"></div>
            <button onclick="addNewRule()" style="width:100%; padding:12px; border:2px dashed #ccc; background:none; border-radius:12px; margin:15px 0;">+ THÊM MỐC KM</button>
            <div style="background:white; padding:15px; border-radius:12px; margin-bottom: 20px;">
                <label style="font-size:12px; font-weight:bold;">Mỗi KM tiếp theo tính thêm:</label>
                <input type="number" id="price_next_km" style="width:100%; padding:10px; margin-top:8px; border:1px solid #ddd; border-radius:8px;">
            </div>
            <button class="btn btn-start" style="width:100%;" onclick="saveAllSettings()">LƯU CÀI ĐẶT</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([16.8173, 107.0988], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    setTimeout(() => { map.invalidateSize(); }, 500);

    var startCoords = null, destCoords = null, routingControl = null;
    var isShipping = false, currentFare = 0;

    // Load bảng giá từ v8.2
    var priceRules = JSON.parse(localStorage.getItem('sqt_rules')) || [{km: 2, price: 15000}, {km: 3, price: 20000}];
    var nextKmPrice = parseInt(localStorage.getItem('sqt_next_price')) || 10000;

    // GPS Marker
    var myMarker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#0984e3', fillOpacity: 1, weight: 3}).addTo(map);

    function updateLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            const p = [pos.coords.latitude, pos.coords.longitude];
            myMarker.setLatLng(p);
            if (!isShipping && !destCoords) map.panTo(p);
        }, null, {enableHighAccuracy: true});
    }
    setInterval(updateLocation, 5000);

    // --- CHỨC NĂNG 1: TÌM KIẾM ĐỊA CHỈ & BÁO GIÁ (Như v8.2) ---
    async function findAddress(type) {
        let input = document.getElementById(type === 'start' ? 'startAddr' : 'destAddr').value;
        if(!input) return;
        try {
            let resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(input + ', Quảng Trị')}&limit=1`);
            let data = await resp.json();
            if(data[0]) {
                const pt = L.latLng(data[0].lat, data[0].lon);
                if(type === 'start') startCoords = pt; else destCoords = pt;
                map.setView(pt, 15);
                calculateQuote();
            }
        } catch(e) { alert("Lỗi kết nối"); }
    }

    map.on('click', e => {
        if(isShipping) return;
        destCoords = e.latlng;
        // Nếu chưa chọn điểm đi, mặc định lấy vị trí GPS hiện tại làm điểm đi
        if(!startCoords) {
            navigator.geolocation.getCurrentPosition(pos => {
                startCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
                calculateQuote();
            });
        } else { calculateQuote(); }
    });

    function calculateQuote() {
        if(!startCoords || !destCoords) return;
        if(routingControl) map.removeControl(routingControl);
        
        routingControl = L.Routing.control({
            waypoints: [startCoords, destCoords],
            createMarker: () => null,
            lineOptions: { styles: [{ color: '#6c5ce7', weight: 5, opacity: 0.7 }] }
        }).addTo(map);

        routingControl.on('routesfound', e => {
            const d = e.routes[0].summary.totalDistance / 1000;
            updateDisplay(d);
            document.getElementById('btnSaveQuote').style.display = 'block';
            document.getElementById('navBtn').style.display = 'block';
            document.getElementById('navBtn').href = `https://www.google.com/maps/dir/?api=1&origin=${startCoords.lat},${startCoords.lng}&destination=${destCoords.lat},${destCoords.lng}&travelmode=motorcycle`;
        });
    }

    // --- CHỨC NĂNG 2: GHI ĐƠN THỰC TẾ (Theo ý bạn) ---
    function startOrder() {
        navigator.geolocation.getCurrentPosition(pos => {
            startCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
            isShipping = true;
            destCoords = null; 
            if(routingControl) map.removeControl(routingControl);

            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnDone').style.display = 'block';
            document.getElementById('btnCancel').style.display = 'block';
            document.getElementById('btnSaveQuote').style.display = 'none';
            document.getElementById('statusBadge').innerText = "ĐANG GIAO (THỰC TẾ)...";
            document.getElementById('statusBadge').className = "status-badge status-shipping";
            
            L.marker(startCoords).addTo(map).bindPopup("Điểm lấy hàng").openPopup();
        }, null, {enableHighAccuracy: true});
    }

    function completeOrder() {
        navigator.geolocation.getCurrentPosition(pos => {
            const endCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
            const d = calcDist(startCoords.lat, startCoords.lng, endCoords.lat, endCoords.lng);
            saveData(d, "Giao thực tế");
            alert("Đã lưu đơn! Quãng đường thực tế: " + d.toFixed(2) + " km");
            resetUI();
        }, null, {enableHighAccuracy: true});
    }

    // --- LOGIC TÍNH TIỀN ---
    function updateDisplay(d) {
        document.getElementById('out-dist').innerText = d.toFixed(2);
        let sorted = [...priceRules].sort((a,b) => a.km - b.km);
        let fare = sorted[0].price;
        for(let r of sorted) { 
            if(d <= r.km) { fare = r.price; break; } 
            else { fare = sorted[sorted.length-1].price + (Math.ceil(d - sorted[sorted.length-1].km) * nextKmPrice); }
        }
        currentFare = fare;
        document.getElementById('out-fare').innerText = fare.toLocaleString() + "đ";
        updateTotal();
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        // Nhân 1.25 để bù trừ đường thực tế so với chim bay
        return (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * R * 1.25;
    }

    function saveQuote() {
        const d = parseFloat(document.getElementById('out-dist').innerText);
        const addr = document.getElementById('destAddr').value || "Bản đồ";
        saveData(d, "Báo giá: " + addr);
        alert("Đã lưu đơn báo giá!");
        resetUI();
    }

    function saveData(d, note) {
        let h = JSON.parse(localStorage.getItem('sqt_v93')) || [];
        const cod = parseInt(document.getElementById('codAmount').value) || 0;
        h.unshift({ date: new Date().toLocaleString('vi-VN'), dist: d.toFixed(2), fare: currentFare, cod: cod, note: note });
        localStorage.setItem('sqt_v93', JSON.stringify(h));
    }

    // --- TIỆN ÍCH ---
    function resetUI() {
        isShipping = false; startCoords = null; destCoords = null; currentFare = 0;
        if(routingControl) map.removeControl(routingControl);
        document.getElementById('btnStart').style.display = 'block';
        document.getElementById('btnDone').style.display = 'none';
        document.getElementById('btnCancel').style.display = 'none';
        document.getElementById('btnSaveQuote').style.display = 'none';
        document.getElementById('navBtn').style.display = 'none';
        document.getElementById('statusBadge').innerText = "CHƯA CÓ ĐƠN";
        document.getElementById('statusBadge').className = "status-badge status-waiting";
        document.getElementById('startAddr').value = ""; document.getElementById('destAddr').value = "";
        document.getElementById('codAmount').value = "";
        document.getElementById('out-dist').innerText = "0.0";
        document.getElementById('out-fare').innerText = "0đ";
        document.getElementById('out-total').innerText = "0đ";
    }

    function updateTotal() {
        const cod = parseInt(document.getElementById('codAmount').value) || 0;
        document.getElementById('out-total').innerText = (currentFare + cod).toLocaleString() + "đ";
    }

    function renderRules() {
        const container = document.getElementById('rules-container');
        container.innerHTML = priceRules.map((rule, index) => `
            <div style="display:flex; align-items:center; gap:8px; background:white; padding:10px; border-radius:10px; margin-bottom:8px;">
                <span style="font-size:12px">Dưới</span>
                <input type="number" value="${rule.km}" onchange="priceRules[${index}].km=parseFloat(this.value)" style="width:40px; text-align:center;">
                <span style="font-size:12px">km =</span>
                <input type="number" value="${rule.price}" onchange="priceRules[${index}].price=parseInt(this.value)" style="width:70px; text-align:right;">
                <span onclick="priceRules.splice(${index},1);renderRules()" style="color:red; margin-left:auto; font-weight:bold; padding:5px;">×</span>
            </div>`).join('');
        document.getElementById('price_next_km').value = nextKmPrice;
    }

    function saveAllSettings() {
        nextKmPrice = parseInt(document.getElementById('price_next_km').value);
        localStorage.setItem('sqt_rules', JSON.stringify(priceRules));
        localStorage.setItem('sqt_next_price', nextKmPrice);
        alert("Đã lưu bảng giá!");
    }
    function addNewRule() { priceRules.push({km: 5, price: 30000}); renderRules(); }

    function renderHistory() {
        let h = JSON.parse(localStorage.getItem('sqt_v93')) || [];
        document.getElementById('history-list').innerHTML = h.map(i => `
            <div class="history-item">
                <div style="font-size:10px; color:#999;">${i.date}</div>
                <div style="font-size:13px; font-weight:bold; margin:3px 0;">${i.note}</div>
                <div style="font-size:14px; color:var(--dark);">Ship: <b>${i.fare.toLocaleString()}đ</b> - ${i.dist}km</div>
                <div style="font-size:13px; color:var(--danger);">COD: ${i.cod.toLocaleString()}đ</div>
            </div>`).join('');
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
    function showPage(p) { 
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        if(p !== 'home') document.getElementById('page-'+p).classList.add('active');
        if(p === 'history') renderHistory();
        if(p === 'settings') renderRules();
        toggleMenu(); 
    }
    function clearHistory() { if(confirm("Xóa hết lịch sử?")) { localStorage.removeItem('sqt_v93'); renderHistory(); } }

    window.onload = updateLocation;
</script>
</body>
</html>
