<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shipper Quảng Trị v9.7 Ultimate</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --primary: #00b894; --secondary: #0984e3; --danger: #d63031; --bg: #f5f6fa; --dark: #2d3436; --purple: #6c5ce7; --warning: #fdbe19; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); overflow: hidden; height: 100vh; }

        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            display: flex; align-items: center; height: 55px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Thống kê doanh thu - Font & Layout mới */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: white; border-bottom: 1px solid #eee; }
        .stat-card { text-align: center; padding: 8px 2px; background: #fff; border-radius: 8px; }
        .stat-card span { font-size: 10px; color: #888; display: block; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .stat-card b { font-size: 12px; color: var(--dark); display: block; }
        .stat-card.active-money b { color: var(--primary); }

        .container { height: 100vh; width: 100%; position: relative; padding-top: 55px; }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* Form Công nợ mới - Đẹp mắt */
        .debt-container { padding: 15px; }
        .debt-card-form { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .debt-card-form label { font-size: 12px; font-weight: bold; color: var(--secondary); margin-bottom: 5px; display: block; }
        .debt-card-form input { 
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #edf2f7; 
            border-radius: 10px; background: #f8fafc; outline: none; transition: 0.3s;
        }
        .debt-card-form input:focus { border-color: var(--secondary); background: white; }

        /* Lịch sử thẻ */
        .item-card { 
            background: white; padding: 15px; margin: 10px; border-radius: 15px; 
            position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); 
            border-left: 4px solid #ddd;
        }
        .item-card.status-done { border-left-color: var(--primary); }
        .item-card.status-pending { border-left-color: var(--warning); }
        
        .btn-confirm-done { 
            width: 100%; margin-top: 10px; padding: 8px; background: var(--secondary); 
            color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 12px;
        }

        /* Các thành phần UI khác giữ nguyên */
        .search-area { position: absolute; top: 65px; left: 10px; right: 10px; z-index: 1001; display: flex; flex-direction: column; gap: 5px; }
        .input-group { display: flex; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
        .input-group input { flex: 1; padding: 12px; border: none; font-size: 13px; outline: none; }
        .btn-find { background: var(--secondary); color: white; border: none; padding: 0 12px; font-weight: bold; }
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; z-index: 1002; background: white; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 15px 15px 60px 15px; box-shadow: 0 -8px 30px rgba(0,0,0,0.1); }
        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .row-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 14px; color: white; text-align: center; text-decoration: none; cursor: pointer; }
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2500; display: none; }
        .page { display: none; height: 100%; overflow-y: auto; background: var(--bg); position: absolute; top: 55px; width: 100%; z-index: 2001; padding-bottom: 100px; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div style="cursor:pointer; font-size: 22px; margin-right: 15px;" onclick="toggleMenu()">☰</div>
    <h3 style="font-size: 13px; margin: 0;">SHIPPER QUẢNG TRỊ v9.7 ULTIMATE</h3>
</header>

<div class="sidebar" id="sidebar">
    <div class="menu-item" style="padding: 20px;" onclick="showPage('home')">🏠 Bản đồ & Ghi đơn</div>
    <div class="menu-item" style="padding: 20px;" onclick="showPage('history')">📜 Lịch sử & Doanh thu</div>
    <div class="menu-item" style="padding: 20px;" onclick="showPage('debt')">💸 Quản lý Công nợ</div>
    <div class="menu-item" style="padding: 20px;" onclick="showPage('settings')">⚙️ Cài đặt bảng giá</div>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container">
    <div id="page-home" style="height: 100%; position: relative;">
        <div class="search-area">
            <div class="input-group"><input type="text" id="startAddr" placeholder="📍 Lấy hàng..."><button class="btn-find" onclick="findAddress('start')">TÌM</button></div>
            <div class="input-group"><input type="text" id="destAddr" placeholder="🏁 Giao khách..."><button class="btn-find" onclick="findAddress('dest')">TÌM</button></div>
        </div>
        <div id="map"></div>
        <div class="bottom-panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; text-align:center">
                <div style="flex:1"><span>KM</span><br><b id="out-dist">0.0</b></div>
                <div style="flex:1"><span>Ship</span><br><b id="out-fare">0đ</b></div>
                <div style="flex:1"><span>Tổng thu</span><br><b id="out-total" style="color:var(--danger)">0đ</b></div>
            </div>
            <div style="background:#f1f3f5; padding:8px; border-radius:12px; margin-bottom:10px; display:flex; align-items:center; justify-content:center;">
                COD: <input type="number" id="codAmount" style="width:100px; border:none; background:none; font-weight:bold; font-size:18px; text-align:center;" placeholder="0" oninput="updateTotal()">
            </div>
            <div class="btn-group">
                <div id="action-btns" class="row-btns">
                    <button class="btn" style="background:var(--secondary)" onclick="startOrder()">📍 NHẬN GPS</button>
                    <button id="btnQuoteSave" class="btn" style="background:var(--purple); display:none;" onclick="saveQuoteOrder()">📝 LƯU BÁO GIÁ</button>
                </div>
                <div id="shipping-btns" class="row-btns" style="display:none">
                    <button class="btn" style="background:var(--primary)" onclick="completeRealOrder()">✅ GIAO XONG</button>
                    <button class="btn" style="background:#b2bec3; flex:0.3" onclick="resetUI()">HỦY</button>
                </div>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="stats-grid">
            <div class="stat-card"><span>NGÀY</span><b id="stat-day">0đ</b></div>
            <div class="stat-card"><span>TUẦN</span><b id="stat-week">0đ</b></div>
            <div class="stat-card"><span>THÁNG</span><b id="stat-month">0đ</b></div>
            <div class="stat-card active-money"><span>NĂM</span><b id="stat-year">0đ</b></div>
        </div>
        <div id="history-list"></div>
    </div>

    <div id="page-debt" class="page">
        <div class="debt-container">
            <div class="debt-card-form">
                <label>KHÁCH HÀNG / SHOP</label>
                <input type="text" id="debtName" placeholder="Tên khách hàng">
                <label>SỐ TIỀN NỢ (VNĐ)</label>
                <input type="number" id="debtMoney" placeholder="0">
                <label>NỘI DUNG GHI CHÚ</label>
                <input type="text" id="debtNote" placeholder="Ví dụ: Nợ ship 2 đơn">
                <button class="btn" style="background:var(--primary); width:100%;" onclick="addDebt()">LƯU CÔNG NỢ</button>
            </div>
            <div id="debt-list"></div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div style="padding:20px;">
            <h4>CÀI ĐẶT BẢNG GIÁ</h4>
            <div id="rules-container"></div>
            <button class="btn" style="background:none; color:var(--dark); border:2px dashed #ccc; width:100%; margin-bottom:10px;" onclick="addNewRule()">+ THÊM MỐC</button>
            <input type="number" id="price_next_km" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
            <button class="btn" style="background:var(--primary); width:100%; margin-top:15px;" onclick="saveAllSettings()">LƯU CÀI ĐẶT</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([16.8173, 107.0988], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var startCoords = null, destCoords = null, routingControl = null, currentFare = 0, isShipping = false;
    var priceRules = JSON.parse(localStorage.getItem('sqt_rules')) || [{km: 2, price: 15000}];
    var nextKmPrice = parseInt(localStorage.getItem('sqt_next_price')) || 10000;

    var myMarker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#0984e3', fillOpacity: 1, weight: 3}).addTo(map);

    function updateLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            const p = [pos.coords.latitude, pos.coords.longitude];
            myMarker.setLatLng(p);
            if (!isShipping && !destCoords) map.panTo(p);
        }, null, {enableHighAccuracy: true});
    }
    setInterval(updateLocation, 4000);

    // BẢN ĐỒ & TÍNH TIỀN
    async function findAddress(type) {
        let input = document.getElementById(type === 'start' ? 'startAddr' : 'destAddr').value;
        if(!input) return;
        try {
            let resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(input + ', Quảng Trị')}&limit=1`);
            let data = await resp.json();
            if(data[0]) {
                const pt = L.latLng(data[0].lat, data[0].lon);
                if(type === 'start') startCoords = pt; else destCoords = pt;
                map.setView(pt, 15); calculateQuote();
            }
        } catch(e) {}
    }

    map.on('click', e => {
        if(isShipping) return;
        destCoords = e.latlng;
        if(!startCoords) {
            navigator.geolocation.getCurrentPosition(pos => {
                startCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
                calculateQuote();
            }, null, {enableHighAccuracy: true});
        } else { calculateQuote(); }
    });

    function calculateQuote() {
        if(!startCoords || !destCoords) return;
        if(routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({ 
            waypoints: [startCoords, destCoords], 
            createMarker: () => null, 
            lineOptions: { styles: [{ color: '#6c5ce7', weight: 6 }] } 
        }).addTo(map);
        routingControl.on('routesfound', e => {
            const d = e.routes[0].summary.totalDistance / 1000;
            updateDisplay(d);
            document.getElementById('btnQuoteSave').style.display = 'block';
        });
    }

    function updateDisplay(d) {
        document.getElementById('out-dist').innerText = d.toFixed(2);
        let sorted = [...priceRules].sort((a,b) => a.km - b.km);
        let fare = sorted[0].price;
        for(let r of sorted) { if(d <= r.km) { fare = r.price; break; } else { fare = sorted[sorted.length-1].price + (Math.ceil(d - sorted[sorted.length-1].km) * nextKmPrice); } }
        currentFare = fare; 
        document.getElementById('out-fare').innerText = fare.toLocaleString() + "đ";
        updateTotal();
    }

    function updateTotal() {
        const cod = parseInt(document.getElementById('codAmount').value) || 0;
        document.getElementById('out-total').innerText = (currentFare + cod).toLocaleString() + "đ";
    }

    // --- LOGIC LƯU TRỮ VÀ DOANH THU ---
    function saveData(d, note, status) {
        let h = JSON.parse(localStorage.getItem('sqt_v97_hist')) || [];
        const cod = parseInt(document.getElementById('codAmount').value) || 0;
        h.unshift({ 
            id: Date.now(), 
            time: Date.now(),
            dateStr: new Date().toLocaleString('vi-VN'),
            dist: d.toFixed(2), 
            fare: currentFare, 
            cod: cod, 
            note: note, 
            status: status // 'done' hoặc 'pending'
        });
        localStorage.setItem('sqt_v97_hist', JSON.stringify(h));
    }

    function saveQuoteOrder() {
        const d = parseFloat(document.getElementById('out-dist').innerText);
        const addr = document.getElementById('destAddr').value || "Điểm trên bản đồ";
        saveData(d, "Báo giá: " + addr, "pending");
        alert("Đã lưu vào Lịch sử (Chờ giao)");
        resetUI();
    }

    function startOrder() {
        isShipping = true;
        document.getElementById('action-btns').style.display = 'none';
        document.getElementById('shipping-btns').style.display = 'flex';
    }

    function completeRealOrder() {
        const d = parseFloat(document.getElementById('out-dist').innerText);
        saveData(d, "Giao GPS thực tế", "done");
        alert("Đã hoàn thành!");
        resetUI();
    }

    function confirmDelivery(id) {
        let h = JSON.parse(localStorage.getItem('sqt_v97_hist'));
        let idx = h.findIndex(x => x.id === id);
        h[idx].status = 'done';
        localStorage.setItem('sqt_v97_hist', JSON.stringify(h));
        renderHistory();
    }

    function renderHistory() {
        let h = JSON.parse(localStorage.getItem('sqt_v97_hist')) || [];
        let now = new Date();
        let dayT = 0, weekT = 0, monthT = 0, yearT = 0;

        h.forEach(i => {
            if(i.status === 'done') {
                let d = new Date(i.time);
                if(d.toDateString() === now.toDateString()) dayT += i.fare;
                if((now - d) / 864e5 <= 7) weekT += i.fare;
                if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthT += i.fare;
                if(d.getFullYear() === now.getFullYear()) yearT += i.fare;
            }
        });

        document.getElementById('stat-day').innerText = dayT.toLocaleString() + "đ";
        document.getElementById('stat-week').innerText = weekT.toLocaleString() + "đ";
        document.getElementById('stat-month').innerText = monthT.toLocaleString() + "đ";
        document.getElementById('stat-year').innerText = yearT.toLocaleString() + "đ";

        document.getElementById('history-list').innerHTML = h.map(i => `
            <div class="item-card ${i.status === 'done' ? 'status-done' : 'status-pending'}">
                <div style="font-size:10px; color:#999;">${i.dateStr}</div>
                <div style="font-weight:bold; margin:5px 0;">${i.note}</div>
                <div>Ship: <b>${i.fare.toLocaleString()}đ</b> | COD: ${i.cod.toLocaleString()}đ</div>
                ${i.status === 'pending' ? `<button class="btn-confirm-done" onclick="confirmDelivery(${i.id})">XÁC NHẬN ĐÃ GIAO</button>` : `<div style="color:var(--primary); font-size:11px; margin-top:5px; font-weight:bold;">✓ Đã hoàn thành</div>`}
                <span onclick="deleteHist(${i.id})" style="position:absolute; top:10px; right:15px; color:#ccc;">×</span>
            </div>
        `).join('');
    }

    // --- CÔNG NỢ ---
    function addDebt() {
        const name = document.getElementById('debtName').value;
        const money = document.getElementById('debtMoney').value;
        const note = document.getElementById('debtNote').value;
        if(!name || !money) return alert("Nhập đủ tên và tiền!");
        let d = JSON.parse(localStorage.getItem('sqt_v97_debt')) || [];
        d.unshift({ id: Date.now(), name, money: parseInt(money), note, paid: false });
        localStorage.setItem('sqt_v97_debt', JSON.stringify(d));
        document.getElementById('debtName').value = ''; document.getElementById('debtMoney').value = ''; document.getElementById('debtNote').value = '';
        renderDebt();
    }

    function renderDebt() {
        let d = JSON.parse(localStorage.getItem('sqt_v97_debt')) || [];
        document.getElementById('debt-list').innerHTML = d.map(i => `
            <div class="item-card" style="border-left:5px solid ${i.paid?'#00b894':'#fdbe19'}">
                <b>${i.name}</b>
                <div style="color:var(--danger); font-weight:bold; font-size:16px;">${i.money.toLocaleString()}đ</div>
                <div style="font-size:12px; color:#666;">${i.note}</div>
                <button class="btn-confirm-done" style="background:${i.paid?'#eee':'#55efc4'}; color:${i.paid?'#999':'#fff'}" onclick="togglePaid(${i.id})">${i.paid?'Đã trả':'Bấm để trả'}</button>
                <span onclick="deleteDebt(${i.id})" style="position:absolute; top:10px; right:15px; color:#ccc;">×</span>
            </div>
        `).join('');
    }

    // PHỤ TRỢ
    function togglePaid(id) { let d = JSON.parse(localStorage.getItem('sqt_v97_debt')); let idx = d.findIndex(x=>x.id===id); d[idx].paid = !d[idx].paid; localStorage.setItem('sqt_v97_debt', JSON.stringify(d)); renderDebt(); }
    function deleteDebt(id) { if(confirm("Xóa nợ?")) { let d = JSON.parse(localStorage.getItem('sqt_v97_debt')).filter(x=>x.id!==id); localStorage.setItem('sqt_v97_debt', JSON.stringify(d)); renderDebt(); } }
    function deleteHist(id) { if(confirm("Xóa đơn?")) { let h = JSON.parse(localStorage.getItem('sqt_v97_hist')).filter(x=>x.id!==id); localStorage.setItem('sqt_v97_hist', JSON.stringify(h)); renderHistory(); } }
    function resetUI() {
        isShipping = false; startCoords = null; destCoords = null; currentFare = 0;
        if(routingControl) map.removeControl(routingControl);
        document.getElementById('action-btns').style.display = 'flex';
        document.getElementById('shipping-btns').style.display = 'none';
        document.getElementById('btnQuoteSave').style.display = 'none';
        document.getElementById('out-dist').innerText = "0.0";
        document.getElementById('out-fare').innerText = "0đ";
        document.getElementById('out-total').innerText = "0đ";
        document.getElementById('codAmount').value = "";
    }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
    function showPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); if(p !== 'home') document.getElementById('page-'+p).classList.add('active'); if(p === 'history') renderHistory(); if(p === 'debt') renderDebt(); if(p === 'settings') renderRules(); toggleMenu(); }
    function renderRules() { const container = document.getElementById('rules-container'); container.innerHTML = priceRules.map((rule, index) => `<div style="display:flex; gap:5px; margin-bottom:5px;">Dưới <input type="number" value="${rule.km}" onchange="priceRules[${index}].km=parseFloat(this.value)" style="width:40px;"> km = <input type="number" value="${rule.price}" onchange="priceRules[${index}].price=parseInt(this.value)" style="width:70px;"> <span onclick="priceRules.splice(${index},1);renderRules()">×</span></div>`).join(''); document.getElementById('price_next_km').value = nextKmPrice; }
    function addNewRule() { priceRules.push({km: 5, price: 30000}); renderRules(); }
    function saveAllSettings() { nextKmPrice = parseInt(document.getElementById('price_next_km').value); localStorage.setItem('sqt_rules', JSON.stringify(priceRules)); localStorage.setItem('sqt_next_price', nextKmPrice); alert("Đã lưu!"); }
    
    window.onload = () => { updateLocation(); map.invalidateSize(); };
</script>
</body>
</html>
