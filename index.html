<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shipper Quảng Trị</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --primary: #00b894; --secondary: #0984e3; --danger: #d63031; --bg: #f5f6fa; --dark: #2d3436; --purple: #6c5ce7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); overflow: hidden; height: 100vh; }

        header { 
            background: var(--primary); color: white; padding: 0 15px; 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            display: flex; align-items: center; height: 55px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .search-area { position: absolute; top: 65px; left: 10px; right: 10px; z-index: 1001; display: flex; flex-direction: column; gap: 5px; pointer-events: none; }
        .input-group { display: flex; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; background: white; border: 1px solid #ddd; pointer-events: auto; }
        .input-group input { flex: 1; padding: 12px; border: none; font-size: 13px; outline: none; }
        .btn-clear { background: #f8f9fa; color: #999; border: none; padding: 0 12px; }
        .btn-find { background: var(--secondary); color: white; border: none; padding: 0 15px; font-weight: bold; }

        .container { height: 100vh; width: 100%; position: relative; padding-top: 55px; }
        #map { height: 100%; width: 100%; z-index: 1; cursor: crosshair; }

        .bottom-panel { 
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 1002;
            background: white; border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 15px 15px 65px 15px; box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
        }

        .info-bar { display: flex; justify-content: space-between; margin-bottom: 10px; text-align: center; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .info-item b { font-size: 16px; color: var(--dark); display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .row-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 14px; cursor: pointer; color: white; }
        .btn-start { background: var(--secondary); }
        .btn-done { background: var(--primary); display: none; }
        .btn-save-quote { background: var(--purple); display: none; }

        .page { display: none; height: 100%; overflow-y: auto; background: var(--bg); position: absolute; top: 55px; width: 100%; z-index: 2001; padding-bottom: 100px; }
        .page.active { display: block; }
        .item-card { background: white; padding: 15px; margin: 10px; border-radius: 15px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid #ddd; }
        
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 3000; transition: 0.3s; padding-top: 60px; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2500; display: none; }
    </style>
</head>
<body>

<header>
    <div style="cursor:pointer; font-size: 22px; margin-right: 15px;" onclick="toggleMenu()">☰</div>
    <h3 style="font-size: 13px; margin: 0;">SHIPPER QUẢNG TRỊ v10.2</h3>
</header>

<div class="sidebar" id="sidebar">
    <div class="menu-item" style="padding:15px;" onclick="showPage('home')">🏠 Bản đồ & Ghi đơn</div>
    <div class="menu-item" style="padding:15px;" onclick="showPage('history')">📜 Lịch sử & Doanh thu</div>
    <div class="menu-item" style="padding:15px;" onclick="showPage('debt')">💸 Quản lý Công nợ</div>
    <div class="menu-item" style="padding:15px;" onclick="showPage('settings')">⚙️ Cài đặt giá</div>
</div>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="container">
    <div id="page-home" style="height: 100%; position: relative;">
        <div class="search-area">
            <div class="input-group">
                <input type="text" id="startAddr" placeholder="📍 Chạm bản đồ chọn điểm LẤY...">
                <button class="btn-clear" onclick="clearPoint('start')">×</button>
                <button class="btn-find" onclick="findAddress('start')">TÌM</button>
            </div>
            <div class="input-group">
                <input type="text" id="destAddr" placeholder="🏁 Chạm bản đồ chọn điểm GIAO...">
                <button class="btn-clear" onclick="clearPoint('dest')">×</button>
                <button class="btn-find" onclick="findAddress('dest')">TÌM</button>
            </div>
        </div>
        <div id="map"></div>
        <div class="bottom-panel">
            <div class="info-bar">
                <div class="info-item"><span>KM</span><b id="out-dist">0.0</b></div>
                <div class="info-item"><span>Ship</span><b id="out-fare">0đ</b></div>
                <div class="info-item"><span>Tổng thu</span><b id="out-total" style="color:var(--danger)">0đ</b></div>
            </div>
            <div style="background:#f1f3f5; padding:8px; border-radius:12px; margin-bottom:12px; display:flex; align-items:center; justify-content:center;">
                COD: <input type="number" id="codAmount" style="width:100px; border:none; background:none; font-weight:bold; font-size:18px; text-align:center;" placeholder="0" oninput="updateTotal()">
            </div>
            <div class="btn-group">
                <div class="row-btns">
                    <button id="btnStart" class="btn btn-start" onclick="startOrder()">📍 NHẬN ĐƠN (GPS)</button>
                    <button id="btnDone" class="btn btn-done" onclick="completeOrder()">✅ GIAO XONG</button>
                </div>
                <button id="btnSaveQuote" class="btn btn-save-quote" onclick="saveQuoteOrder()">📝 LƯU ĐƠN BÁO GIÁ</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div id="history-list"></div>
    </div>

    <div id="page-debt" class="page">
        <div style="padding:15px;">
            <input type="text" id="debtName" placeholder="Tên khách..." style="width:100%; padding:10px; margin-bottom:5px;">
            <input type="number" id="debtMoney" placeholder="Số tiền..." style="width:100%; padding:10px; margin-bottom:5px;">
            <button class="btn btn-start" style="width:100%" onclick="addDebt()">LƯU NỢ</button>
        </div>
        <div id="debt-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
    // Khởi tạo bản đồ
    var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([16.8173, 107.0988], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var startCoords = null, destCoords = null, routingControl = null;
    var startMarker = null, destMarker = null, currentFare = 0, isShipping = false;
    var priceRules = JSON.parse(localStorage.getItem('sqt_rules')) || [{km: 2, price: 15000}];
    var nextKmPrice = parseInt(localStorage.getItem('sqt_next_price')) || 10000;

    // GPS chính xác nhất
    const gpsOptions = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
    var myMarker = L.circleMarker([0,0], {radius: 7, color: '#fff', fillColor: '#0984e3', fillOpacity: 1, weight: 3}).addTo(map);

    function updateLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            myMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
        }, null, gpsOptions);
    }
    setInterval(updateLocation, 3000);

    // FIX CHỨC NĂNG CHỌN BẢN ĐỒ
    map.on('mousedown touchstart', function() { /* Chuẩn bị cho sự kiện chạm */ });

    map.on('click', function(e) {
        if(isShipping) return;
        
        console.log("Map clicked at: ", e.latlng); // Debug log

        if (!startCoords) {
            setPoint('start', e.latlng, "📍 Điểm lấy hàng (Bản đồ)");
        } else {
            // Luôn cập nhật hoặc thay đổi điểm giao khi nhấn tiếp
            setPoint('dest', e.latlng, "🏁 Điểm giao hàng (Bản đồ)");
        }
    });

    function setPoint(type, latlng, label) {
        if(type === 'start') {
            startCoords = latlng;
            if(startMarker) map.removeLayer(startMarker);
            startMarker = L.marker(latlng).addTo(map).bindPopup("Điểm lấy").openPopup();
            document.getElementById('startAddr').value = label;
        } else {
            destCoords = latlng;
            if(destMarker) map.removeLayer(destMarker);
            destMarker = L.marker(latlng).addTo(map).bindPopup("Điểm giao").openPopup();
            document.getElementById('destAddr').value = label;
        }
        
        if(startCoords && destCoords) {
            drawRoute();
        }
    }

    function drawRoute() {
        if(routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            waypoints: [startCoords, destCoords],
            createMarker: () => null,
            lineOptions: { styles: [{ color: '#6c5ce7', weight: 6 }] },
            addWaypoints: false,
            draggableWaypoints: false
        }).addTo(map);

        routingControl.on('routesfound', function(e) {
            var dist = e.routes[0].summary.totalDistance / 1000;
            updatePriceDisplay(dist);
            document.getElementById('btnSaveQuote').style.display = 'block';
        });
    }

    function updatePriceDisplay(d) {
        document.getElementById('out-dist').innerText = d.toFixed(2) + " km";
        let fare = priceRules[0].price;
        let sorted = [...priceRules].sort((a,b) => a.km - b.km);
        for(let r of sorted) {
            if(d <= r.km) { fare = r.price; break; }
            else { fare = sorted[sorted.length-1].price + (Math.ceil(d - sorted[sorted.length-1].km) * nextKmPrice); }
        }
        currentFare = fare;
        document.getElementById('out-fare').innerText = fare.toLocaleString() + "đ";
        updateTotal();
    }

    function updateTotal() {
        const cod = parseInt(document.getElementById('codAmount').value) || 0;
        document.getElementById('out-total').innerText = (currentFare + cod).toLocaleString() + "đ";
    }

    function clearPoint(type) {
        if(type === 'start') {
            startCoords = null; if(startMarker) map.removeLayer(startMarker);
            document.getElementById('startAddr').value = "";
        } else {
            destCoords = null; if(destMarker) map.removeLayer(destMarker);
            document.getElementById('destAddr').value = "";
        }
        if(routingControl) map.removeControl(routingControl);
    }

    async function findAddress(type) {
        let val = document.getElementById(type === 'start' ? 'startAddr' : 'destAddr').value;
        if(!val) return;
        try {
            let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(val + ', Quảng Trị')}&limit=1`);
            let data = await res.json();
            if(data[0]) {
                let loc = L.latLng(data[0].lat, data[0].lon);
                setPoint(type, loc, val);
                map.setView(loc, 15);
            }
        } catch(e) { alert("Lỗi tìm kiếm"); }
    }

    // GPS Thực tế
    function startOrder() {
        navigator.geolocation.getCurrentPosition(pos => {
            startCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
            isShipping = true;
            if(routingControl) map.removeControl(routingControl);
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnDone').style.display = 'block';
            L.marker(startCoords).addTo(map).bindPopup("Bắt đầu thực tế").openPopup();
        }, null, gpsOptions);
    }

    function completeOrder() {
        navigator.geolocation.getCurrentPosition(pos => {
            const end = L.latLng(pos.coords.latitude, pos.coords.longitude);
            const d = (startCoords.distanceTo(end) / 1000) * 1.25; // Tính chim bay nhân hệ số đường vòng
            alert("Giao xong! Quãng đường: " + d.toFixed(2) + "km");
            location.reload(); 
        }, null, gpsOptions);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none'; }
    function showPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); if(p !== 'home') document.getElementById('page-'+p).classList.add('active'); toggleMenu(); }

    window.onload = () => { map.invalidateSize(); };
</script>
</body>
</html>
